# Firebase App Hosting backend configuration.
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Conservative defaults — App Hosting auto-scales from 0 to maxInstances.
  minInstances: 0
  maxInstances: 5
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # Public env vars — committed safely.
  - variable: WORDPRESS_URL
    value: https://www.onlinelearnership.co.za
    availability:
      - BUILD
      - RUNTIME

  - variable: WORDPRESS_REVALIDATE_SECONDS
    value: "300"
    availability:
      - BUILD
      - RUNTIME

  # logo.dev token — replace with your own from https://www.logo.dev once you sign up.
  - variable: NEXT_PUBLIC_LOGODEV_TOKEN
    value: pk_X-1ZO13GSgeOoUrIuJ6GMQ
    availability:
      - BUILD
      - RUNTIME

  # Google AdSense — same publisher ID + ad units that run on the WordPress site
  - variable: NEXT_PUBLIC_ADSENSE_CLIENT
    value: ca-pub-4043939286605519
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_ADSENSE_SLOT_HOMEPAGE
    value: "4412725597"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_ADSENSE_SLOT_ARTICLE
    value: "3974683846"
    availability:
      - BUILD
